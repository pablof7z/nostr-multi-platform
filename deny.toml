# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# License policy uses an allow-list model (version = 2):
#   Licenses NOT in [licenses.allow] are implicitly DENIED.
#   GPL-2.0, GPL-3.0, AGPL-3.0 are denied by omission (not in allow list).

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
# Unmaintained crate warnings are captured in docs/perf/supply-chain-baseline.md.
# To silence a known-acceptable advisory add its ID to the ignore list below.
ignore = [
    # nostr transitively brings `instant`; upstream replacement pending.
    "RUSTSEC-2024-0384",
    # `paste` is archived upstream; existing usage is non-networked macro glue.
    "RUSTSEC-2024-0436",
    # hpke-rs-libcrux@0.6.1 pins libcrux-aead ^0.0.7; upstream update pending.
    "RUSTSEC-2026-0124",
]

[licenses]
version = 2
# Allow-list: everything else is implicitly denied.
allow = [
    # Standard Rust ecosystem licenses
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    # BSD family
    "BSD-2-Clause",
    "BSD-3-Clause",
    # Other permissive
    "ISC",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    # Unicode / ICU data crates (icu_* family)
    "Unicode-DFS-2016",
    "Unicode-3.0",
    # Mozilla Public License (used by some crypto crates)
    "MPL-2.0",
    # Creative Commons / CDLA permissive data crates
    "CDLA-Permissive-2.0",
    # LGPL-2.1 weak copyleft — acceptable when dynamically linked in binary output.
    # r-efi (Windows EFI types) is the only current user.
    "LGPL-2.1-or-later",
    # Boost license in clipboard-win / error-code via desktop + repl stacks.
    "BSL-1.0",
    # Font licenses used by egui default embedded fonts.
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
# ring uses a custom BoringSSL/ISC/OpenSSL blend that cargo-deny can't auto-detect.
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
# Warn on crates with multiple semver-incompatible versions (major-version dupes).
multiple-versions = "warn"
# Workspace path deps use no version spec — skip wildcard check for path deps.
wildcards = "allow"

[sources]
# Only allow crates from the official crates.io registry.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
