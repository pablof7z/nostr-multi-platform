[package]
name = "nmp-app-notes"
version.workspace = true
edition.workspace = true
license.workspace = true

# Second-app stateful spike: a minimal NIP-01 note client (read kind:1,
# publish kind:1, sign-in via nsec or NIP-46 bunker) built on the substrate
# seams exported by `nmp-core` + `nmp-ffi`. No Chirp dependency, no
# protocol-crate dependency, no bespoke `#[no_mangle]` C-ABI symbols beyond
# `nmp_app_notes_init` (a marker, not a protocol seam).
#
# This crate exists to **confirm the framework thesis for stateful apps** —
# the Longform spike already proved the read-only path; this proves write +
# signin work the same way.
[lib]
crate-type = ["staticlib", "rlib"]

[dependencies]
nmp-core = { path = "../../../crates/nmp-core" }
# C-ABI surface (`NmpApp`, `nmp_app_*` symbols) — extracted from
# `nmp-core::ffi` in step 11-final.
nmp-ffi = { path = "../../../crates/nmp-ffi", features = ["signer-broker"] }
