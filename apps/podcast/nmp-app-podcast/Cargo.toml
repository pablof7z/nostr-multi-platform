[package]
name = "nmp-app-podcast"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Per-app Podcast glue. Owns the podcast library state and surfaces it over a static-lib FFI for the iOS shell."

[lib]
name = "nmp_app_podcast"
# Static lib so the iOS shell can link `-lnmp_app_podcast` alongside
# `-lnmp_core`. Crate's `#[no_mangle] extern "C"` symbols
# (`nmp_app_podcast_register`, `nmp_app_podcast_snapshot`,
# `nmp_app_podcast_snapshot_free`, `nmp_app_podcast_unregister`,
# `nmp_app_podcast_subscribe`, `nmp_app_podcast_unsubscribe`) land in their
# own archive. D0: nmp-core has no podcast nouns; this crate is the
# composition point.
crate-type = ["staticlib", "rlib"]

[dependencies]
nmp-core = { path = "../../../crates/nmp-core" }
podcast-core = { path = "../podcast-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ulid = { version = "1", features = ["serde"] }
url = { version = "2", features = ["serde"] }

[dev-dependencies]
# Test-support exposes `nmp_app_new` / `nmp_app_free` so round-trip tests
# can spin up a real `NmpApp`. Matches the pattern in `nmp-app-chirp`.
nmp-core = { path = "../../../crates/nmp-core", features = ["test-support"] }
