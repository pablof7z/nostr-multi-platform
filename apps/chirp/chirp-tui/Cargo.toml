[package]
name = "chirp-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Ratatui terminal shell for the Chirp Nostr client."

[lib]
name = "chirp_tui"
path = "src/lib.rs"

[[bin]]
name = "chirp-tui"
path = "src/main.rs"

[dependencies]
nmp-app-chirp = { path = "../nmp-app-chirp", default-features = false, features = ["marmot", "wallet"] }
nmp-chirp-config = { path = "../nmp-chirp-config" }
nmp-core = { path = "../../../crates/nmp-core", features = ["test-support"] }
# C-ABI surface (`NmpApp`, `nmp_app_*` symbols) — extracted from
# `nmp-core::ffi` in step 11-final.
# V-38: nmp-core no longer has a `wallet` feature; nmp-ffi exposes wallet
# shims unconditionally that route through dispatch_action to `nmp-nip47`.
nmp-ffi = { path = "../../../crates/nmp-ffi", features = ["test-support"] }
clap = { version = "4", features = ["derive"] }
color-eyre = "0.6"
crossterm = "0.29"
ratatui = { version = "0.30", features = ["crossterm"] }
ratatui-image = { version = "11.0.2", default-features = false, features = ["crossterm"] }
serde_json = "1.0"
# NIP-05 pubkey resolution for `:zap <lightning-address>` — fetches
# `https://{domain}/.well-known/nostr.json?name={user}` to obtain the
# recipient's hex pubkey for the kind:9734 zap request. Matches the
# `nmp-nip57` LNURL HTTP dep so the tls/json feature set stays aligned.
ureq = { version = "2", default-features = false, features = ["tls", "json"] }

[dev-dependencies]
insta = { version = "1", features = ["yaml"] }
nmp-nip01 = { path = "../../../crates/nmp-nip01" }
rexpect = "0.7.1"
vt100 = "0.16.2"
