[package]
name = "nmp-app-chirp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Per-app Chirp glue. Owns the Nip10ModularTimelineView instance, drives it from KernelEventObserver fan-out, and surfaces the projected blocks over a static-lib FFI for the iOS shell."

[lib]
name = "nmp_app_chirp"
# Static lib so the iOS shell can link `-lnmp_app_chirp` alongside
# `-lnmp_core`. The crate's `#[no_mangle] extern "C"` symbols
# (`nmp_app_chirp_register`, `nmp_app_chirp_snapshot`,
# `nmp_app_chirp_snapshot_free`, `nmp_app_chirp_unregister`) land in their
# own archive because doctrine D0 forbids `nmp-core -> nmp-nip01 /
# nmp-threading`, so we cannot re-export them through `libnmp_core.a` the
# way `android-ffi` does (T146 / ADR-0009).
crate-type = ["staticlib", "rlib"]

[features]
# Default feature set for non-iOS builds (tests, CI, `cargo check`).
# `marmot` is intentionally absent: 5,400 LOC of MLS-over-Nostr is not on the
# v1 critical path and excluded from the default build to keep CI fast.
# The `justfile` iOS build targets pass `--features marmot` explicitly so the
# Chirp iOS shell still links all `nmp_marmot_*` symbols.
default = ["wallet", "lmdb-backend"]
# Marmot (MLS-over-Nostr) projection. Activates the `nmp-marmot` dependency
# AND its `ffi` feature, which compiles the relocated C-ABI shell
# (`apps/marmot/nmp-app-marmot/src/ffi.rs` + siblings) and the
# `nmp_marmot_*` symbols. PD-033-A: the shell lives in `nmp-marmot` so the
# crate is a standalone buildable target for a future Marmot-only app;
# Chirp picks up the symbols transparently via rlib linkage. The
# `keyring-core` / `apple-native-keyring-store` deps moved to
# `nmp-marmot`'s `ffi` feature (no need to duplicate them here).
# Deferred post-v1; off in a no-default-features build.
marmot = ["dep:nmp-marmot", "nmp-marmot/ffi"]
# NIP-47 Nostr Wallet Connect. Forwards to `nmp-ffi/wallet` (which itself
# forwards to `nmp-core/wallet`) so the kernel compiles the
# `nmp_app_wallet_*` FFI symbols the iOS shell links + nmp-ffi sees the
# matching `wallet_status` slot the actor signature requires.
wallet = ["nmp-ffi/wallet", "nmp-core/wallet"]
# Persistent local cache / publish-intent ledger for offline-first Chirp.
lmdb-backend = ["nmp-core/lmdb-backend"]

[dependencies]
nmp-core = { path = "../../../crates/nmp-core" }
# `nmp-ffi` owns the `NmpApp` C-ABI handle (extracted from
# `nmp-core::ffi` in step 11-final). Chirp's `nmp_app_chirp_register`
# takes `*mut NmpApp`; the per-app crate names the handle + the FFI
# symbols (`nmp_app_dispatch_action`, etc.) through this dep.
nmp-ffi = { path = "../../../crates/nmp-ffi" }
nmp-signer-broker = { path = "../../../crates/nmp-signer-broker" }
# Canonical NMP composition root (step 10 — V-48). One call wires the
# default action modules (NIP-02 / NIP-17 / NIP-57 / NIP-65), the
# kind:10050 ingest parser, the production routing substrate
# (`GenericOutboxRouter` + `InMemoryMailboxCache`), the D2 coverage hook,
# and the DM-inbox + zap-receipts runtime controllers. Chirp's
# `nmp_app_chirp_register` calls `register_defaults` once at app init
# instead of duplicating ~130 LOC of boilerplate; the dm/zap runtime
# modules that used to live in this crate (`src/dm_runtime.rs`,
# `src/zap_receipts_runtime.rs`) moved into the template's `runtimes`
# module.
nmp-app-template = { path = "../../../crates/nmp-app-template" }
nmp-nip01 = { path = "../../../crates/nmp-nip01" }
nmp-nip18 = { path = "../../../crates/nmp-nip18" }
# NIP-02 (follow list, kind:3) + NIP-25 (reactions, kind:7). Chirp registers
# the crate's `FollowModule` / `UnfollowModule` / `ReactModule` against the
# kernel action registry — this is the D0-clean replacement for the deleted
# per-verb `nmp_app_follow` / `nmp_app_unfollow` / `nmp_app_react` C symbols.
# Lifted out of `apps/chirp/nmp-app-chirp/src/ffi/actions.rs` so any Nostr
# app on top of NMP wires the social graph with a single
# `nmp_nip02::register_actions(app)` call (Opus direction review #10
# 30-day call). D0-clean: `nmp-core` gains no NIP-02 / NIP-25 nouns.
nmp-nip02 = { path = "../../../crates/nmp-nip02" }
# NIP-29 relay-based groups. Chirp registers the crate's typed
# `JoinRequestAction` `ActionModule` against the kernel action registry —
# proving the host-extensibility seam works for NIP-crate modules, not just
# Chirp's own social verbs. D0-clean: `nmp-core` gains no group nouns.
nmp-nip29 = { path = "../../../crates/nmp-nip29" }
# NIP-57 lightning zaps — direct dep for the Chirp-specific
# `ZapsAggregateProjection` event observer + `"nmp.nip57.zaps"` snapshot
# projection (per-target zap-count aggregate read for the timeline). The
# `nmp.nip57.zap` action module + kind:9734 builder + LNURL fetcher are
# wired by `nmp-app-template::register_defaults` (transitively).
nmp-nip57 = { path = "../../../crates/nmp-nip57" }
nmp-threading = { path = "../../../crates/nmp-threading" }
# Marmot (MLS-over-Nostr). The C-ABI shell now lives inside this crate
# (`apps/marmot/nmp-app-marmot/src/ffi.rs`, gated by `nmp-marmot/ffi`); no
# MLS type crosses the FFI (`group_id` is hex, errors are strings).
# Optional + feature-gated (`marmot`): deferred post-v1, so the default-off
# build excludes it.
nmp-marmot = { path = "../../marmot/nmp-app-marmot", optional = true }
# `nostr` reconstructs typed `Event` / `Keys` / `PublicKey` / `RelayUrl`
# values from the C-ABI JSON and builds the kind:444 message rumor.
# Pinned to the workspace `0.44` graph (nmp-core + mdk-core re-export the
# same graph — no version duplication).
nostr = { version = "0.44", default-features = false, features = ["std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zeroize.workspace = true
# (The `keyring-core` + `apple-native-keyring-store` deps were relocated to
# `nmp-marmot`'s `ffi` feature alongside `src/marmot/` — see the `marmot`
# feature above. Chirp no longer references them directly.)

[dev-dependencies]
# Test-support gates expose `nmp_app_new` / `nmp_app_free` (and the
# `nmp_app_register_event_observer` FFI symbol via Rust path) so the FFI
# smoke tests in `src/ffi.rs` can spin up a real `NmpApp` rather than mocking
# the slot. Matches the pattern in the other protocol crates (e.g. `nmp-nip01`).
nmp-core = { path = "../../../crates/nmp-core", features = ["test-support"] }
nmp-ffi = { path = "../../../crates/nmp-ffi", features = ["test-support"] }
# `nmp-nip17` for the DM-inbox round-trip integration test
# (`tests/dm_inbox_round_trip.rs`). The production
# `DmInboxProjection` + `nmp.nip17.send` action module are wired in
# Chirp via `nmp_app_template::register_defaults` (transitively).
nmp-nip17 = { path = "../../../crates/nmp-nip17" }
# (The `mdk-sqlite-storage` + `mdk-core` dev-deps were relocated alongside
# the Marmot FFI smoke tests to `nmp-marmot`'s `src/ffi/tests.rs`; Chirp no
# longer references any MLS types directly.)
# `nmp-nip59` supplies the `gift_wrap` primitive used in the DM-inbox
# round-trip tests so the test fixtures construct kind:1059 envelopes through
# the same production path the inbox unwraps (mirroring the unit tests in
# `crates/nmp-nip17/src/inbox.rs`). Dev-only — Chirp depends on `nmp-nip17`
# in production but never calls the gift-wrap primitive directly.
nmp-nip59 = { path = "../../../crates/nmp-nip59" }
# `nmp-wasm` supplies `AppAction` / `AppActionDispatch` used in the web
# action contract test (`tests/web_action_contract.rs`) — verifies that the
# WASM worker's typed intents map correctly to the registered action namespaces.
nmp-wasm = { path = "../../../crates/nmp-wasm" }
