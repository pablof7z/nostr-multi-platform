[package]
name = "nmp-app-chirp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Per-app Chirp glue. Owns the Nip10ModularTimelineView instance, drives it from KernelEventObserver fan-out, and surfaces the projected blocks over a static-lib FFI for the iOS shell."

[lib]
name = "nmp_app_chirp"
# Static lib so the iOS shell can link `-lnmp_app_chirp` alongside
# `-lnmp_core`. The crate's `#[no_mangle] extern "C"` symbols
# (`nmp_app_chirp_register`, `nmp_app_chirp_snapshot`,
# `nmp_app_chirp_snapshot_free`, `nmp_app_chirp_unregister`) land in their
# own archive because doctrine D0 forbids `nmp-core -> nmp-nip01 /
# nmp-threading`, so we cannot re-export them through `libnmp_core.a` the
# way `android-ffi` does (T146 / ADR-0009).
crate-type = ["staticlib", "rlib"]

[features]
# Default feature set keeps the current iOS Chirp shell build unchanged: the
# `justfile` builds `cargo build -p nmp-app-chirp` with NO `--features` flag, so
# defaults are load-bearing. `marmot` and `wallet` were formally deferred to
# post-v1; they remain compiled-in for Chirp (which opts in here) while the
# default kernel build (`nmp-core` defaults) excludes them.
default = ["marmot", "wallet", "lmdb-backend"]
# Marmot (MLS-over-Nostr) projection. Gates the `nmp-marmot` dependency, the
# `src/marmot/` C-ABI shell module, and the `nmp_app_chirp_marmot_*` FFI
# symbols. Deferred post-v1; off in a no-default-features build.
marmot = ["dep:nmp-marmot", "dep:keyring-core", "dep:apple-native-keyring-store"]
# NIP-47 Nostr Wallet Connect. Forwards to `nmp-core/wallet` so the kernel
# compiles the `nmp_app_wallet_*` FFI symbols the iOS shell links. Deferred
# post-v1; off in a no-default-features build.
wallet = ["nmp-core/wallet"]
# Persistent local cache / publish-intent ledger for offline-first Chirp.
lmdb-backend = ["nmp-core/lmdb-backend"]

[dependencies]
nmp-core = { path = "../../../crates/nmp-core" }
nmp-signer-broker = { path = "../../../crates/nmp-signer-broker" }
nmp-nip01 = { path = "../../../crates/nmp-nip01" }
# NIP-29 relay-based groups. Chirp registers the crate's typed
# `JoinRequestAction` `ActionModule` against the kernel action registry —
# proving the host-extensibility seam works for NIP-crate modules, not just
# Chirp's own social verbs. D0-clean: `nmp-core` gains no group nouns.
nmp-nip29 = { path = "../../../crates/nmp-nip29" }
# NIP-17 private direct messages. Chirp wires the crate's `DmInboxProjection`
# (kind:1059 raw-event observer + `nip17.dm_inbox` snapshot projection) and
# registers its `SendDmAction` `ActionModule` for the `nmp.nip17.send` verb.
# D0-clean: `nmp-core` gains no DM nouns.
nmp-nip17 = { path = "../../../crates/nmp-nip17" }
# NIP-57 lightning zaps. Chirp registers the crate's `ZapAction`
# `ActionModule` for the `nmp.nip57.zap` verb — the executor builds the
# kind:9734 zap request and enqueues `ActorCommand::FetchLnurlInvoice`,
# which the actor handles by signing the request on-thread and spawning a
# worker for the LNURL-pay HTTP round-trip (ADR-0024 minimum-viable path).
# D0-clean: `nmp-core` gains no zap nouns — `nmp-nip57` types stay in the
# protocol crate; only the generic `FetchLnurlInvoice` arm lives in core.
nmp-nip57 = { path = "../../../crates/nmp-nip57" }
nmp-threading = { path = "../../../crates/nmp-threading" }
# Marmot (MLS-over-Nostr). This crate's `src/marmot/` module consumes the
# typed `MarmotService` translation layer; no MLS type crosses its C-ABI
# (`group_id` is hex, errors are strings). Optional + feature-gated (`marmot`):
# deferred post-v1, so the default-off build excludes it.
nmp-marmot = { path = "../../../crates/nmp-marmot", optional = true }
# `nostr` reconstructs typed `Event` / `Keys` / `PublicKey` / `RelayUrl`
# values from the C-ABI JSON and builds the kind:444 message rumor.
# Pinned to the workspace `0.44` graph (nmp-core + mdk-core re-export the
# same graph — no version duplication).
nostr = { version = "0.44", default-features = false, features = ["std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zeroize.workspace = true
# Keyring for encrypted Marmot MLS DB. `mdk-sqlite-storage` requires a
# platform-specific keyring store to be initialized before use.
keyring-core = { version = "1", optional = true }

[target.'cfg(any(target_os = "ios", target_os = "tvos", target_os = "watchos", target_os = "visionos"))'.dependencies]
apple-native-keyring-store = { version = "1.0", features = ["protected"], optional = true }

[dev-dependencies]
# Test-support gates expose `nmp_app_new` / `nmp_app_free` (and the
# `nmp_app_register_event_observer` FFI symbol via Rust path) so the FFI
# smoke tests in `src/ffi.rs` can spin up a real `NmpApp` rather than mocking
# the slot. Matches the pattern in the other protocol crates (`nmp-nip01`,
# `nmp-nip22`, `nmp-relations`).
nmp-core = { path = "../../../crates/nmp-core", features = ["test-support"] }
nmp-wasm = { path = "../../../crates/nmp-wasm" }
# `test-utils` gates `MdkSqliteStorage::new_in_memory` so the Marmot FFI
# smoke tests can spin up a real `MarmotService` without a keyring /
# on-disk SQLite file (mirrors `crates/nmp-marmot/src/tests.rs`).
mdk-sqlite-storage = { version = "0.8.0", features = ["test-utils"] }
# The Marmot FFI smoke tests build a `NostrGroupConfigData` to drive the
# real `create_group` round-trip. Logic moved to `nmp-marmot`, so this is
# now a dev-only dependency (Chirp ships zero MLS types in production).
mdk-core = "0.8.0"
# `nmp-nip59` supplies the `gift_wrap` primitive used in the DM-inbox
# round-trip tests so the test fixtures construct kind:1059 envelopes through
# the same production path the inbox unwraps (mirroring the unit tests in
# `crates/nmp-nip17/src/inbox.rs`). Dev-only — Chirp depends on `nmp-nip17`
# in production but never calls the gift-wrap primitive directly.
nmp-nip59 = { path = "../../../crates/nmp-nip59" }
