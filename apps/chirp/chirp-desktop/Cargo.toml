[package]
name = "chirp-desktop"
description = "Native desktop shell for the Chirp Nostr client (egui + in-process Chirp FFI)."
edition.workspace = true
license.workspace = true
version.workspace = true

[[bin]]
name = "chirp-desktop"
path = "src/main.rs"

[dependencies]
# Chirp composition root — brings in modular timeline, DM inbox, follow list,
# action modules, and all per-app FFI symbols. Same feature set as chirp-tui.
nmp-app-chirp = { path = "../nmp-app-chirp", default-features = false, features = ["marmot", "wallet"] }

# C-ABI surface (NmpApp, nmp_app_* symbols).
nmp-ffi = { path = "../../../crates/nmp-ffi", features = ["test-support"] }

# In-process kernel: we still decode FlatBuffer frames and use display helpers.
nmp-core = { path = "../../../crates/nmp-core", features = ["test-support"] }

# Content IR consumed directly in-process (Rust→Rust, no wire projection).
nmp-content = { path = "../../../crates/nmp-content" }

eframe = "0.29"
egui   = "0.29"
serde  = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zeroize = { workspace = true }
