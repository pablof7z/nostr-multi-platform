[package]
name = "nmp-gallery-desktop"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "iced component gallery for NMP desktop widgets. Sidebar lists all REGISTRY_SECTIONS components; user-* components show live kind:0 data via the same kernel flows as the TUI gallery."

[[bin]]
name = "nmp-gallery-desktop"
path = "src/main.rs"

[dependencies]
iced = { version = "0.14", features = ["tokio", "image"] }
nmp-content = { path = "../../../crates/nmp-content" }
nmp-core = { path = "../../../crates/nmp-core" }
nmp-gallery-tui = { path = "../tui" }
serde_json = { workspace = true }
ureq = { version = "2", default-features = false, features = ["tls"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp"] }
