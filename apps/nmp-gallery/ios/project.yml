name: NmpGallery
options:
  bundleIdPrefix: org.nmp
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
targets:
  NmpGallery:
    type: application
    platform: iOS
    sources:
      - path: NmpGallery
    info:
      path: NmpGallery/App/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        CFBundleDisplayName: NmpGallery
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.nmp.gallery
        PRODUCT_MODULE_NAME: NmpGallery
        PRODUCT_NAME: NmpGallery
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: NmpGallery/Bridge/NmpGallery.h
        # The gallery links one aggregate Rust archive — `libnmp_app_gallery.a` —
        # that bundles the kernel + a gallery-tailored projection
        # (`nmp_app_gallery_register` / `_snapshot` / `_snapshot_free`). The
        # parallel `crates/nmp-app-gallery` crate builds it via
        # `cargo build -p nmp-app-gallery --target aarch64-apple-ios-sim`.
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/../../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../../target/aarch64-apple-ios/release
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../../target/aarch64-apple-ios-sim/release
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_gallery"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  NmpGallery:
    build:
      targets:
        NmpGallery: all
