[package]
name = "nmp-app-longform"
version.workspace = true
edition.workspace = true
license.workspace = true

# Second-app spike: a read-only NIP-23 long-form article reader built ONLY on
# `nmp-core`'s substrate seams (no `nmp-app-chirp` dep, no iOS dep). This crate
# is the falsification test for the framework thesis — see `apps/longform/README.md`.
#
# Built as both an rlib (for in-process Rust callers / tests) and a cdylib (so
# a third-party host can link the C-ABI entry points in `src/ffi.rs`).
[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
# `nmp_app_new`, `nmp_app_start`, `nmp_app_free`, and `nmp_app_free_string` are
# re-exported under the default `native` feature (crates/nmp-core/src/lib.rs:86-97).
# No `test-support` workaround needed — the framework finding recorded in
# `apps/longform/README.md` is now resolved.
nmp-core = { path = "../../../crates/nmp-core" }
# C-ABI surface (`NmpApp`, `nmp_app_*` symbols) — extracted from
# `nmp-core::ffi` in step 11-final.
nmp-ffi = { path = "../../../crates/nmp-ffi" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
