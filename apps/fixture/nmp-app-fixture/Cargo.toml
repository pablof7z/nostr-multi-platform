[package]
name = "nmp-app-fixture"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# Use the default `native` feature for the production-side lifecycle FFI
# (`nmp_app_new` / `nmp_app_free` / `nmp_app_dispatch_action` /
# `nmp_app_free_string`). A legitimate third-party app crate must not have
# to opt into `test-support` to initialise the kernel.
nmp-core = { path = "../../../crates/nmp-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
fixture_todo_core = { package = "fixture-todo-core", path = "../../../crates/fixture-todo-core" }
