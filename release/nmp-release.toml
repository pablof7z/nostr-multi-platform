# Canonical release-train manifest for NMP.
#
# This file is operational configuration, not a planning document. The product
# plan lives in docs/plan/m17-release.md and docs/BACKLOG.md.

schema_version = 1
release_train = "nmp"
version_source = "workspace.package.version"
tag_pattern = "nmp-v{version}"
crates_io_tool = "release-plz"
npm_cli_package = "@nmp/cli"
npm_publish_mode = "trusted-publishing"

required_gates = [
  "cargo test --workspace --exclude nmp-android-ffi --exclude nmp-app-chirp --exclude nmp-desktop",
  "cargo test -p nmp-testing --test doctrine_lint_smoke",
  "bash ci/check-release-manifest.sh",
  "bash ci/release-package-dry-run.sh",
  "bash ci/check-flatbuffers-version-pins.sh",
  "bash ci/check-ffi-header-drift.sh",
  "bash ci/check-ffi-surface-freeze.sh",
]

