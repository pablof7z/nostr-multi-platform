name: file-size-gate

# Enforces AGENTS.md 300 LOC warn / 500 LOC hard cap on hand-authored source.
# In CI we check files changed by the current push/PR so legacy debt does not
# fail unrelated work; the full-tree scan remains available locally.
#
# NOTE: brainstorm item #6 (requests.rs 574 LOC split) is resolved — the file
# was already decomposed into kernel/requests/{mod,profile,thread}.rs before
# this gate landed. UniFFI-generated bindings are exempted via .file-size-ignore.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  file-size:
    name: File-size check (300 warn / 500 hard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file sizes (changed files in this run)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FROM_REF="${{ github.event.pull_request.base.sha }}"
            TO_REF="${{ github.event.pull_request.head.sha }}"
          else
            FROM_REF="${{ github.event.before }}"
            TO_REF="${{ github.sha }}"
          fi

          # Initial push events use an all-zero "before" SHA.
          if [[ "$FROM_REF" == "0000000000000000000000000000000000000000" ]]; then
            FROM_REF="$(git rev-list --max-parents=0 "$TO_REF")"
          fi

          bash .githooks/check-file-size.sh --from-ref "$FROM_REF" --to-ref "$TO_REF"

      - name: Smoke test — fixture must trigger hard-cap report
        run: |
          # Verify the gate can actually detect a violation.
          # --dry-run exits 0 even on violations, so this step always passes;
          # the grep on the output is the real assertion.
          OUTPUT=$(bash .githooks/check-file-size.sh --dry-run \
            --force-include crates/nmp-testing/fixtures/file-size-gate/oversized.rs 2>&1 || true)
          echo "$OUTPUT"
          if ! echo "$OUTPUT" | grep -q "HARD-cap violation"; then
            echo "SMOKE TEST FAILED: gate did not report a hard-cap violation for the fixture." >&2
            exit 1
          fi
          echo "Smoke test passed — gate correctly identified oversized.rs as a violation."
