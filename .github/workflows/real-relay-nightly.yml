name: real-relay nightly

# Runs the real_relay_* integration tests nightly against public Nostr relays.
# These tests are #[ignore] in test.yml because they open live sockets — this
# workflow provides the falsifiable CI signal for F-02 / F-04 v1 blockers.
#
# A failed run means something broke in the relay pipeline, not a flaky test.
# If the relay is simply down, the reachability pre-check marks the job
# skipped instead of failed so downtime doesn't block v1 tracking.
#
# Gate: v1 exits only after this workflow is green for 7 consecutive days
# (see docs/BACKLOG.md V-15).

on:
  schedule:
    # 03:00 UTC daily — off-peak for Damus relay
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Allow manual runs for on-demand verification

jobs:
  real-relay:
    name: real-relay integration tests
    runs-on: ubuntu-latest
    # Mark the job skipped (not failed) when the primary relay is unreachable,
    # so transient relay downtime doesn't block v1 tracking.
    continue-on-error: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-real-relay-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-real-relay-

      # Relay reachability check: if relay.damus.io is unreachable, skip the
      # tests rather than failing (flapping relay ≠ broken publish pipeline).
      - name: Check relay reachability
        id: relay_check
        run: |
          # websocat is not present on the runner; use curl's --http1.1 upgrade
          # probe (any non-refused TCP + HTTP 101/400 means the relay is up).
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -H "Upgrade: websocket" \
            -H "Connection: Upgrade" \
            -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
            -H "Sec-WebSocket-Version: 13" \
            https://relay.damus.io 2>/dev/null || echo "000")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          # 101 = WebSocket upgrade accepted; 400 = relay rejected WS upgrade
          # (expected from a plain HTTPS probe); anything else = down.
          if [ "$HTTP_CODE" = "000" ]; then
            echo "relay_up=false" >> "$GITHUB_OUTPUT"
          else
            echo "relay_up=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if relay is unreachable
        if: steps.relay_check.outputs.relay_up == 'false'
        run: |
          echo "::warning ::relay.damus.io unreachable (curl returned 000) — skipping real-relay suite. This is relay downtime, not a pipeline failure."
          exit 0

      - name: cargo test — real_relay suite (--ignored)
        if: steps.relay_check.outputs.relay_up == 'true'
        run: |
          cargo test -p nmp-testing \
            --features test-support \
            -- --ignored --nocapture 2>&1 | tee real_relay_output.txt
        timeout-minutes: 15
        env:
          # Increase stack size — NMP kernel uses deep async stacks.
          RUST_MIN_STACK: 8388608
          RUST_BACKTRACE: 1

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-relay-output-${{ github.run_id }}
          path: real_relay_output.txt
          retention-days: 7
