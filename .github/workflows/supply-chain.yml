name: supply-chain

# Runs cargo-audit (RUSTSEC vulnerability advisories) and cargo-deny
# (license compliance + duplicate-dep detection + advisory checks) on every
# PR and every push to master.  Caches the cargo registry so subsequent runs
# are fast.

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"

jobs:
  audit:
    name: cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + advisory DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/advisory-db
          key: cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-audit-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        # Exit 0 on warnings (unmaintained crates) to avoid blocking PRs for
        # issues with no available fix. Actual vulnerabilities still fail the
        # build. See docs/perf/supply-chain-baseline.md for current warnings.
        run: cargo audit

  deny:
    name: cargo deny (licenses + bans + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-deny-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deny-

      - name: Run cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Run all checks: advisories, bans, licenses, sources.
          command: check
          # Use the deny.toml at the repo root.
          manifest-path: Cargo.toml
          # Treat advisory errors as failures; warnings are printed but don't
          # block the build.  See deny.toml [advisories].ignore for known-safe
          # exceptions.
          arguments: --all-features
