name: chirp-web

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/chirp-web.yml"
      - "crates/nmp-wasm/**"
      - "web/chirp/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/chirp-web.yml"
      - "crates/nmp-wasm/**"
      - "web/chirp/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  chirp-web:
    name: wasm facade and web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Test wasm facade
        run: cargo test -p nmp-wasm

      - name: Check wasm target
        run: cargo check -p nmp-wasm --target wasm32-unknown-unknown

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/chirp/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web/chirp

      - name: Build Chirp web
        run: npm run build
        working-directory: web/chirp

      - name: Test Chirp web runtime
        run: npm run test
        working-directory: web/chirp

      - name: Audit web dependencies
        run: npm audit --audit-level=moderate
        working-directory: web/chirp
