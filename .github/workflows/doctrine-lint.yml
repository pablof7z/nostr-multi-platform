name: doctrine-lint

# Enforces the four cardinal-doctrine grep gates against `nmp-core`:
#   - D0: no app nouns (NIP-29, group_id, pin_to, ...) in the kernel substrate
#   - D6: no panic / unwrap / expect / unreachable / todo outside test cfg
#   - D7: capability traits never name policy-decision verbs (retry, select, ...)
#   - D8: hot-path-marked fns never allocate per-event (format!, Vec::new, ...)
#
# Brainstorm item #8 — see docs/perf/parallel-work-brainstorm-2026-05-18.md
# Per-rule docstrings live in crates/nmp-testing/bin/doctrine-lint/rules/.
#
# This workflow runs the binary directly (catches new violations) AND the
# smoke test (asserts the lint itself behaves correctly against fixtures).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  doctrine-lint:
    name: Doctrine grep gates (D0/D6/D7/D8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-doctrine-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-doctrine-lint-

      - name: Build doctrine-lint
        run: cargo build -p nmp-testing --bin doctrine-lint

      - name: Run doctrine-lint against nmp-core
        run: cargo run --quiet -p nmp-testing --bin doctrine-lint -- --crate nmp-core

      - name: Run smoke tests (fixtures pass/fail per rule)
        run: cargo test -p nmp-testing --test doctrine_lint_smoke -- --nocapture

      - name: Run rule unit tests
        run: cargo test -p nmp-testing --bin doctrine-lint
