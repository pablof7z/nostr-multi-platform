[package]
name = "nmp-nip51"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "NIP-51 lists (mute / bookmark / relay lists + follow / relay / bookmark sets) as an NMP protocol crate — pure decoder (try_from_event) + per-list-type builders (UnsignedEvent) + DomainModule + ViewModules per docs/design/kind-wrappers.md §3."

[dependencies]
nmp-core = { path = "../nmp-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
