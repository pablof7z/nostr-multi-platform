[package]
name = "nmp-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Browser-facing NMP worker protocol and wasm runtime facade."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# V-01 Phase 1b: nmp-core compiled with `default-features = false` so the
# wasm32 build sees only the pure kernel + ActorCommand data type + substrate
# traits. Phase 1c (PR #341) gated actor/, relay_worker/, and tungstenite
# behind `#[cfg(feature = "native")]`, which unblocked this dep. Phase 2 will
# wire NmpApp into WasmRuntime using a WASM-compatible transport
# (web_sys::WebSocket + IndexedDB store).
nmp-core = { path = "../nmp-core", default-features = false }
nmp-chirp-config = { path = "../nmp-chirp-config" }
# V-01 Stage 3b — `nmp-signers` for the NIP-07 browser-extension `Signer`.
# Always-on dependency: `nmp-signers` itself compiles on every host (its native
# code is the non-wasm fallback that returns `SignerError::Unsupported`). The
# `wasm` feature unlocks the real `window.nostr.signEvent(...)` bridge on
# wasm32; on native targets the feature is a no-op (the cfg guard inside
# `signers/nip07.rs` evaluates `false`).
nmp-signers = { path = "../nmp-signers", features = ["wasm"] }
nmp-signer-iface = { path = "../nmp-signer-iface" }
nostr = { workspace = true, features = ["std"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
wasm-bindgen = "0.2.121"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3.98"
# V-01 Stage 3 — `BrowserRelayDriver` owns the `web_sys::WebSocket` lifecycle.
# Feature set kept minimal: `WebSocket` itself for send/close, `MessageEvent`
# to read incoming frames, `CloseEvent` for the close reason, `ErrorEvent` to
# surface socket errors, `BinaryType` to opt into ArrayBuffer payloads, and
# `Window` to install the reconnect-deadline `setTimeout` (no `setInterval` —
# D8 no-polling: each tick re-arms the next deadline only after the kernel
# has processed the inbound frame).
web-sys = { version = "0.3.98", features = [
    "BinaryType",
    "CloseEvent",
    "ErrorEvent",
    "MessageEvent",
    "WebSocket",
    "Window",
] }
# V-01 Stage 3b — drive the `Nip07Signer::sign()` Promise round-trip from the
# JS event loop without blocking the wasm thread. `spawn_local` parks a future
# that awaits `window.nostr.signEvent(...).then(...)` and pushes the result
# into an `mpsc::Receiver` the `SignerOp::Pending(rx)` carries back to the
# caller. No tokio — `wasm-bindgen-futures` is a pure JS Promise glue crate
# (it is already a transitive dep of the workspace through `nostr`).
wasm-bindgen-futures = "0.4.71"
