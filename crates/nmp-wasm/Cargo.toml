[package]
name = "nmp-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Browser-facing NMP worker protocol and wasm runtime facade."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# V-01 Phase 1b: nmp-core dep is deferred until Phase 1c (RelayFrame enum)
# decouples kernel/ingest from tungstenite. Once actor/ and relay_worker/ are
# gated behind `#[cfg(feature = "native")]`, add:
#   nmp-core = { path = "../nmp-core", default-features = false }
# and verify `cargo check -p nmp-wasm` passes.
nmp-chirp-config = { path = "../nmp-chirp-config" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
wasm-bindgen = "0.2.121"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3.98"
