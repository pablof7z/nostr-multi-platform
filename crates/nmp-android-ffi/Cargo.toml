# Standalone workspace root (empty [workspace] table) so the parent workspace
# at ../../Cargo.toml does NOT pull this crate in. The parent `members` list is
# explicit (no glob); this detachment keeps Android territory file-disjoint and
# avoids editing the shared root manifest. See android/JNI-CONTRACT.md.
[workspace]

[package]
name = "nmp-android-ffi"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
name = "nmp_android_ffi"
crate-type = ["cdylib"]

[dependencies]
# Path-dep on the SAME kernel the iOS app consumes. nmp-core exposes a `rlib`
# crate-type, so its `#[no_mangle] extern "C"` symbols link into this cdylib;
# we redeclare them `extern "C"` (no Rust API is re-exported) — identical
# contract to ios NmpCore.h.
nmp-core = { path = "../nmp-core", features = ["android-ffi"] }
jni = "0.21"
# Podcast per-app glue — called via Rust paths (not extern "C" redecl) so
# the linker sees the symbol bodies and includes them in the cdylib. D0 holds:
# nmp-core never gains podcast nouns; this crate is the composition point.
nmp-app-podcast = { path = "../../apps/podcast/nmp-app-podcast" }
