[package]
name = "nmp-signer-broker"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Bunker (NIP-46) handshake + transport broker bridging nmp-core and nmp-signers."

[lib]
name = "nmp_signer_broker"
# Static lib so iOS can link `-lnmp_signer_broker` alongside `-lnmp_core`. The
# crate's `#[no_mangle] extern "C"` symbols (`nmp_signer_broker_init`,
# `nmp_app_cancel_bunker_handshake`) need to land in a separate archive
# because doctrine D0 forbids `nmp-core -> nmp-signer-broker`, so we cannot
# re-export them through `libnmp_core.a` the way `android-ffi` does.
crate-type = ["staticlib", "rlib"]

[dependencies]
nmp-core = { path = "../nmp-core" }
nmp-signers = { path = "../nmp-signers" }
nmp-signer-iface = { path = "../nmp-signer-iface" }
nostr = { version = "0.44", features = ["std", "nip04", "nip44"] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tungstenite = { version = "0.24", default-features = false, features = ["handshake", "rustls-tls-webpki-roots"] }

[dev-dependencies]
# Test-only: a synthetic relay accept loop on 127.0.0.1 for integration tests.
