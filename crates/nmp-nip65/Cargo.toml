[package]
name = "nmp-nip65"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "NIP-65 relay list — kind:10002 outbox/inbox advertisement. Pure tag builder + `nmp.nip65.publish_relay_list` ActionModule; the actor thread signs and routes (D7)."

[dependencies]
# `nmp-core` supplies the substrate `UnsignedEvent` type — the same flat
# repr every other `ActorCommand` payload uses, so `build_relay_list_event`
# output drops straight into `ActorCommand::PublishUnsignedEvent` with no
# conversion. It also supplies the `ActionModule` trait this crate's
# `PublishRelayListAction` implements.
nmp-core = { path = "../nmp-core" }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
