[package]
name = "nmp-nip57"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
repository.workspace = true
description = "NIP-57 lightning zaps as an NMP protocol crate — ZapReceiptRecord decoder (kind:9735) + ZapRequestBuilder (kind:9734) + ZapAction ActionModule + ZapsView + LNURL-pay fetcher (FetchLnurlInvoiceCommand)."

[dependencies]
nmp-core = { path = "../nmp-core" }
# V-43: zap-pay chain — after fetching the bolt11, `FetchLnurlInvoiceCommand`
# auto-dispatches `WalletPayInvoiceCommand` using the process-global
# `active_wallet_runtime()`. The correlation_id threads through so the
# `nmp.nip57.zap` action closes on kind:23195 confirmation, not on bolt11 fetch.
nmp-nip47 = { path = "../nmp-nip47" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# LNURL-pay fetcher dependencies (V-41). The fetcher runs on
# `std::thread::spawn` from the actor's `Protocol(...)` dispatch arm and
# uses `ureq` for the two-leg HTTP round-trip. `bech32` decodes LUD-01
# `lnurl1…` inputs; `nostr` mints the kind:9734 signature on the actor
# thread (the keys come from `ProtocolCommandContext::active_local_keys`).
ureq = { version = "2", default-features = false, features = ["tls", "json"] }
bech32 = "0.11"
nostr = { workspace = true }
# Diagnostic logger for the LNURL worker (matches the rest of nmp-core's
# tracing usage). Always available — `tracing` is in the lockfile via
# nostr already, so this adds nothing new.
tracing = "0.1"

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
nmp-ffi = { path = "../nmp-ffi", features = ["test-support"] }
