[package]
name = "nmp-signers"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Signer trait + Local nsec / NIP-46 bunker / NIP-07 implementations + multi-account IdentityModule for nmp-core."

[lib]
name = "nmp_signers"

[features]
default = []
# Feature flag for the wasm-only NIP-07 implementation.  Off by default;
# enabling without a wasm target is a compile error (intentional — see
# `signers/nip07.rs`).
wasm = []

[dependencies]
nmp-core = { path = "../nmp-core" }
nmp-signer-iface = { path = "../nmp-signer-iface" }
nostr = { workspace = true, features = ["std", "nip04", "nip44", "nip49"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
url = "2.5"

[dev-dependencies]
# No proc-macro fuzz crate — we keep the dep surface small and roll our own
# deterministic generator (see `fuzz/bunker_uri.rs`).
