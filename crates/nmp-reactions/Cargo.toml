[package]
name = "nmp-relations"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "NIP-25 reactions (kind:7) + NIP-18 reposts (kind:6 / generic kind:16) as an NMP protocol crate — pure decoder (try_from_event) + builders (UnsignedEvent) + DomainModule + ViewModule per docs/design/kind-wrappers.md §3."

[dependencies]
nmp-core = { path = "../nmp-core" }
# Cross-NIP facade composition (`relations` module) — the applesauce-shape
# ergonomic surface for apps. This crate is the cross-NIP composition layer:
# it owns the relation kinds (reactions/reposts) and the `relations` facade
# that ties together nip01/nip22/nip57, hence the `nmp-relations` name.
nmp-nip01 = { path = "../nmp-nip01" }
nmp-nip22 = { path = "../nmp-nip22" }
nmp-nip57 = { path = "../nmp-nip57" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
