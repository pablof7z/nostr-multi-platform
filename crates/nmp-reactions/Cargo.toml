[package]
name = "nmp-reactions"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "NIP-25 reactions (kind:7) + NIP-18 reposts (kind:6 / generic kind:16) as an NMP protocol crate — pure decoder (try_from_event) + builders (UnsignedEvent) + DomainModule + ViewModule per docs/design/kind-wrappers.md §3."

[dependencies]
nmp-core = { path = "../nmp-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
