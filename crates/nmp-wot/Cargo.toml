[package]
name = "nmp-wot"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "Client-side web-of-trust primitives for NMP: follow/mute graph scoring plus automatic replaceable-kind bootstrap interests."

[dependencies]
nmp-core = { path = "../nmp-core" }
nmp-ffi = { path = "../nmp-ffi" }
nostr = { workspace = true, features = ["std"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
nmp-nip77 = { path = "../nmp-nip77" }
