[package]
name = "nmp-testing"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "NMP testing harnesses, doctrine lint gates, mock relays, stress tests, and release validation utilities."

[features]
# Enable LMDB-backed store tests. Passes through to nmp-core's lmdb-backend feature.
lmdb-backend = ["nmp-core/lmdb-backend"]
# Enable real-relay integration tests (A1-A6 relay-search-radius acceptance suite).
# These tests open live WebSocket connections and are excluded from the default
# scoped-test path.  Run explicitly:
#   cargo test -p nmp-testing --features real-relay --test <name> -- --ignored --nocapture
real-relay = []

[dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
# C-ABI surface (`NmpApp`, `nmp_app_*` symbols) — extracted from
# `nmp-core::ffi` in step 11-final. The `ffi-stress` harness binary
# reaches the symbols through here.
nmp-ffi = { path = "../nmp-ffi", features = ["test-support"] }
paste = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
nmp-app-chirp = { path = "../../apps/chirp/nmp-app-chirp" }
nmp-core = { path = "../nmp-core" }
zeroize = { workspace = true }
nmp-ffi = { path = "../nmp-ffi" }
nmp-nip01 = { path = "../nmp-nip01" }
nmp-nip17 = { path = "../nmp-nip17" }
nmp-nip42 = { path = "../nmp-nip42" }
nmp-nip57 = { path = "../nmp-nip57" }
nmp-nip59 = { path = "../nmp-nip59" }
# V-51 phase 4 validation harness — `routing_trace_real_nostr` test
# constructs `GenericOutboxRouter` + `InMemoryMailboxCache` + the
# `Kind10002Parser` directly to seed the cache from a live kind:10002
# fetch, then observes via a kernel-side `RoutingTraceProjection`.
nmp-router = { path = "../nmp-router" }
nmp-signers = { path = "../nmp-signers" }
nmp-signer-broker = { path = "../nmp-signer-broker" }
nmp-signer-iface = { path = "../nmp-signer-iface" }
# Real-relay smoke test dependencies (real_relay_smoke.rs).
# NIP-46 mock-bunker integration test (nip46_bunker_signing.rs) needs nip04/nip44.
nostr = { version = "0.44", features = ["std", "nip04", "nip44"] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
tungstenite = { version = "0.24", default-features = false, features = ["handshake", "rustls-tls-webpki-roots"] }
# Marmot exit-gate integration tests (marmot_*.rs).
# nmp-marmot drives MarmotService; test-utils gates new_unencrypted / new_in_memory.
# mdk-core exposes MessageProcessingResult + NostrGroupConfigData + GroupId for assertions.
# tempfile provides ephemeral SQLite paths for state-fork (post-compromise test).
nmp-marmot = { path = "../nmp-marmot" }
mdk-core = "0.8.0"
mdk-sqlite-storage = { version = "0.8.0", features = ["test-utils"] }
tempfile = "3"
# Relay-search-radius acceptance tests (A1-A6) capture stderr using FD-level
# pipe/dup2 to intercept the NMP_CLAIM_LOG structured output from actor threads.
libc = "0.2"

[[bin]]
name = "reactivity-bench"
path = "bin/reactivity-bench/main.rs"

[[bin]]
name = "firehose-bench"
path = "bin/firehose-bench/main.rs"

# M10.5 FFI hardening harness — S1..S5 (phase 1)
# Links nmp_app_* FFI symbols via the Rust rlib dependency with test-support
# feature; exercises the identical code paths Swift uses via extern "C" ABI.
[[bin]]
name = "ffi-stress"
path = "bin/ffi-stress/main.rs"

# Doctrine-lint — D0+D6+D7+D8 grep gates (Tier 1 item #8 from
# docs/perf/parallel-work-brainstorm-2026-05-18.md). Grep-based static
# analyzer with `#[cfg(test)]` module tracking; runs in CI on push +
# pull_request via `.github/workflows/doctrine-lint.yml`.
# `cargo run -p nmp-testing --bin doctrine-lint -- --crate nmp-core`
[[bin]]
name = "doctrine-lint"
path = "bin/doctrine-lint/main.rs"

# Doctrine-lint smoke test — runs the binary against fixtures under
# bin/doctrine-lint/fixtures/ and asserts pass/fail per rule.
# `cargo test -p nmp-testing --test doctrine_lint_smoke`
[[test]]
name = "doctrine_lint_smoke"
path = "bin/doctrine-lint/tests.rs"

# M2 subscription compiler audit gate — Assertions 1–5 (phase 1 subset).
# `cargo test -p nmp-testing --test m2_subscription_compilation_audit`
[[test]]
name = "m2_subscription_compilation_audit"
path = "tests/m2_subscription_compilation_audit.rs"

# M8-subs — subscription lifecycle integration tests (Task #46).
# Pins the seam between M2's CompiledPlan and the wire: registry, trigger
# inbox, wire-emitter, connection pool. Eight tests defined in
# `docs/plan/m8-subscription-lifecycle.md` §6.
# `cargo test -p nmp-testing --test m8_subscription_lifecycle`
[[test]]
name = "m8_subscription_lifecycle"
path = "tests/m8_subscription_lifecycle.rs"

# Framework magic contract — 13 behaviour tests (C1-C13) + coverage meta-test.
# Cross-cutting; intentionally not milestone-prefixed.
# `cargo test -p nmp-testing --test framework_magic_contract`
[[test]]
name = "framework_magic_contract"
path = "tests/framework_magic_contract.rs"

# T66 pulse-builder — real-relay smoke for Nip65OutboxResolver + kind:1 round-trip.
# All tests `#[ignore]` by default; run explicitly:
#   cargo test -p nmp-testing --test real_relay_smoke -- --ignored --nocapture
[[test]]
name = "real_relay_smoke"
path = "tests/real_relay_smoke.rs"

# PR #631 verification — NIP-17 gift-wrap round-trip over a real relay using
# the post-pub(crate) `gift_wrap_with_signer` seam (Alice publishes from one
# socket; Bob subscribes on a separate socket and decrypts).
# `#[ignore]` by default; run explicitly:
#   cargo test -p nmp-testing --test real_relay_nip17_roundtrip -- --ignored --nocapture
[[test]]
name = "real_relay_nip17_roundtrip"
path = "tests/real_relay_nip17_roundtrip.rs"

# PR #631 verification — Marmot kind:445 group-message round-trip over a real
# relay (Alice publishes the encrypted MLS message; Bob's socket receives and
# decrypts via MarmotService). Two in-process MarmotService instances share
# state via the harness; the wire path is the only "real" part.
# `#[ignore]` by default; run explicitly:
#   cargo test -p nmp-testing --test real_relay_marmot_roundtrip -- --ignored --nocapture
[[test]]
name = "real_relay_marmot_roundtrip"
path = "tests/real_relay_marmot_roundtrip.rs"

# Marmot milestone exit-gate integration tests.
# Run all five: `cargo test -p nmp-testing --test 'marmot_*'`
# Or per-file, e.g.: `cargo test -p nmp-testing --test marmot_key_package_lifecycle`
[[test]]
name = "marmot_key_package_lifecycle"
path = "tests/marmot_key_package_lifecycle.rs"

[[test]]
name = "marmot_message_roundtrip"
path = "tests/marmot_message_roundtrip.rs"

[[test]]
name = "marmot_forward_secrecy"
path = "tests/marmot_forward_secrecy.rs"

[[test]]
name = "marmot_post_compromise"
path = "tests/marmot_post_compromise.rs"

[[test]]
name = "marmot_key_package_rotation"
path = "tests/marmot_key_package_rotation.rs"

# Marmot perf measurement harness (produces timing numbers for perf-measurements.md).
# `cargo test -p nmp-testing --test marmot_perf -- --nocapture`
[[test]]
name = "marmot_perf"
path = "tests/marmot_perf.rs"

# V-51 phase 4 — routing-trace real-relay validation harness. Constructs
# `GenericOutboxRouter` + `InMemoryMailboxCache` + `RoutingTraceProjection`
# directly, seeds the cache from a live kind:10002 fetched from a real
# Nostr relay (pablof7z's published NIP-65), routes a subscription, and
# asserts lane attribution (`Nip65/Read`, no `AppRelay/Fallback`).
# All tests `#[ignore]` by default; run explicitly:
#   cargo test --ignored -p nmp-testing --test routing_trace_real_nostr -- --nocapture
[[test]]
name = "routing_trace_real_nostr"
path = "tests/routing_trace_real_nostr.rs"

# W2 — relay-author-score LMDB persistence integration gate.
# Requires lmdb-backend feature: `cargo test -p nmp-testing --features lmdb-backend --test relay_score_persistence`
[[test]]
name = "relay_score_persistence"
path = "tests/relay_score_persistence.rs"
required-features = ["lmdb-backend"]

# W9 — relay-search-radius acceptance tests A1-A6.
# All tests `#[ignore]` by default; run explicitly with --features real-relay:
#   cargo test -p nmp-testing --features real-relay --test relay_search_radius_a1_cold_claim -- --ignored --nocapture
# A1: cold-claim Gigi article against purplepag.es fallback; assert Phase-1 + Phase-2 wire log lines.
[[test]]
name = "relay_search_radius_a1_cold_claim"
path = "tests/relay_search_radius_a1_cold_claim.rs"
required-features = ["real-relay"]

# A2: warm-path — prime A1, second claim for different Gigi article; assert delivering relay in phase1 set.
[[test]]
name = "relay_search_radius_a2_warm_path"
path = "tests/relay_search_radius_a2_warm_path.rs"
required-features = ["real-relay"]

# A3: restart persistence — prime, drop kernel, reopen same store, re-claim; assert phase1-only hit.
# Requires both lmdb-backend (score persistence) and real-relay (live WebSocket connections).
[[test]]
name = "relay_search_radius_a3_restart_persistence"
path = "tests/relay_search_radius_a3_restart_persistence.rs"
required-features = ["real-relay", "lmdb-backend"]

# A4: doctrine-lint guard — confirms doctrine_lint_smoke binary exits 0.
[[test]]
name = "relay_search_radius_a4_doctrine_lint"
path = "tests/relay_search_radius_a4_doctrine_lint.rs"

# A5: mid-claim unreachable — stub relay drops connection; assert claim advances and failures+=3.
[[test]]
name = "relay_search_radius_a5_mid_claim_unreachable"
path = "tests/relay_search_radius_a5_mid_claim_unreachable.rs"
required-features = ["real-relay"]

# A6: concurrent claims — two simultaneous claims for same author; claim B sees A's score delta.
[[test]]
name = "relay_search_radius_a6_concurrent_claims"
path = "tests/relay_search_radius_a6_concurrent_claims.rs"
required-features = ["real-relay"]

# OP-feed engine doctrine gate (V-80 rung 3): asserts crates/nmp-feed/src names
# zero protocol/profile tokens (nipNN, marmot, ProfileDisplay). No features.
[[test]]
name = "op_feed_doctrine_lint"
path = "tests/op_feed_doctrine_lint.rs"

# M15 — Cross-platform consistency smoke tests. Validates that ChirpClient
# (and other action builders) produce correctly-formed action envelopes across
# all platforms. Unit-level tests (no network, no kernel execution) focus on
# envelope shape invariants: required fields present, JSON valid, deterministic
# serialization.
# `cargo test -p nmp-testing --test cross_platform_parity`
[[test]]
name = "cross_platform_parity"
path = "tests/cross_platform_parity.rs"
