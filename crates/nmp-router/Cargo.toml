[package]
name = "nmp-router"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "Layer-2 routing: one generic OutboxRouter algorithm (NIP-65 mailbox + relay hints + p-tag inbox + indexer eligibility), the NIP-65-only InMemoryMailboxCache, kind:10002 IngestParser, and indexer-republish policy. Step 2 of docs/architecture/crate-boundaries.md."

[dependencies]
# Substrate traits and value types — `OutboxRouter`, `MailboxCache`,
# `IngestParser`, `RoutingContext`, `RoutedRelaySet`, plus the
# `UnsignedEvent` / `ActionModule` types the absorbed
# `nmp.nip65.publish_relay_list` action module depends on.
nmp-core = { path = "../nmp-core" }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
serde_json.workspace = true
