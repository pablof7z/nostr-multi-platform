[package]
name = "nmp-router"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
description = "Layer-2 routing: one generic OutboxRouter algorithm (NIP-65 mailbox + relay hints + p-tag inbox + indexer eligibility), the NIP-65-only InMemoryMailboxCache, and the kind:10002 IngestParser. Step 2 of docs/architecture/crate-boundaries.md."

[dependencies]
# Substrate traits and value types — `OutboxRouter`, `MailboxCache`,
# `IngestParser`, `RoutingContext`, `RoutedRelaySet`, plus the
# `UnsignedEvent` / `ActionModule` types the absorbed
# `nmp.nip65.publish_relay_list` action module depends on.
nmp-core = { path = "../nmp-core" }
# `nmp-ffi` owns the `NmpApp` C-ABI handle (extracted from
# `nmp-core::ffi` in step 11-final). `register_actions` takes
# `&mut NmpApp`, so this crate names the handle through `nmp-ffi`.
nmp-ffi = { path = "../nmp-ffi" }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
nmp-core = { path = "../nmp-core", features = ["test-support"] }
nmp-ffi = { path = "../nmp-ffi", features = ["test-support"] }
