[package]
name = "nmp-core"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "nmp_core"
crate-type = ["staticlib", "rlib"]

[features]
# Expose actor internals for live-bench harnesses and integration test binaries.
# Never enable in production builds.
test-support = []
# Enable the LMDB-backed EventStore (requires heed crate — not yet wired in M3 phase 1).
lmdb-backend = []
# Re-export all FFI entry-points via Rust paths so nmp-android-ffi can call them
# through the rlib dependency (extern "C" declarations are opaque to Rust CGU
# compilation — the android-ffi feature is the portable fix).
android-ffi = []

[dependencies]
bech32 = "0.11"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
nmp-nip42-types = { path = "../nmp-nip42-types" }
nostr = { version = "0.44", features = ["nip44"] }
nmp-nwc = { path = "../nmp-nwc" }
nmp-signer-iface = { path = "../nmp-signer-iface" }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["raw_value"] }
tungstenite = { version = "0.24", default-features = false, features = ["handshake", "rustls-tls-webpki-roots"] }

[dev-dependencies]
proptest = "1"
