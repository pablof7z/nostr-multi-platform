[package]
name = "nmp-core"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "nmp_core"
crate-type = ["staticlib", "rlib"]

[features]
# Expose actor internals for live-bench harnesses and integration test binaries.
# Never enable in production builds.
test-support = []
# Enable the LMDB-backed EventStore. Pulls in the NMP-local nostr-lmdb fork
# (with env-injection seam) + heed + nostr-database. ADR-0011, ADR-0012.
lmdb-backend = ["dep:nmp-nostr-lmdb", "dep:heed", "dep:nostr-database"]
# Re-export all FFI entry-points via Rust paths so nmp-android-ffi can call them
# through the rlib dependency (extern "C" declarations are opaque to Rust CGU
# compilation — the android-ffi feature is the portable fix).
android-ffi = []

[dependencies]
bech32 = "0.11"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
nmp-nip42-types = { path = "../nmp-nip42-types" }
nostr = { workspace = true, features = ["nip44"] }
nmp-nwc = { path = "../nmp-nwc" }
nmp-signer-iface = { path = "../nmp-signer-iface" }
rustls = { workspace = true, default-features = false, features = ["ring"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["raw_value"] }
tungstenite = { workspace = true, default-features = false, features = ["handshake", "rustls-tls-webpki-roots"] }
zeroize = { workspace = true }

# LMDB backend — feature-gated. The fork at crates/nmp-nostr-lmdb carries the
# env-injection seam (ADR-0011); heed / nostr-database are the underlying
# storage and event-encoding crates.
nmp-nostr-lmdb = { path = "../nmp-nostr-lmdb", optional = true }
heed = { version = "0.20", default-features = false, features = ["read-txn-no-tls"], optional = true }
nostr-database = { version = "0.44", default-features = false, features = ["flatbuf"], optional = true }

[dev-dependencies]
proptest = "1"
tempfile = "3"
