name: NmpPodcast
options:
  bundleIdPrefix: com.podcast
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
targets:
  NmpPodcast:
    type: application
    platform: iOS
    # T-podcast-ios-RESTART: Verbatim Podcastr UI restored.
    # - App/ — PodcastApp.swift (renamed from PodcastrApp) + RootView + AppDelegate
    #   + AppSidebarView + PlayerNavSheets + RootView+* (byte-for-byte from Podcastr)
    # - Bridge/ — KernelBridge, KernelModel, NmpCore.h, PodcastrShims (shim types)
    # - Design/ — AppTheme*, Haptics, CachedAsyncImage, etc. (byte-for-byte)
    # - Features/ — stub views for each tab (honest empty states backed by kernel)
    # - Services/ — verbatim Podcastr service layer (Settings, BYOK, Keychain,
    #   credential stores); T-podcast-ios-verbatim-2
    sources:
      - path: NmpPodcast/App
      - path: NmpPodcast/Bridge
      - path: NmpPodcast/Design
      - path: NmpPodcast/Features
      - path: NmpPodcast/Services
      - path: NmpPodcast/Resources
    info:
      path: NmpPodcast/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podcast.app
        PRODUCT_NAME: NmpPodcast
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: NmpPodcast/Bridge/NmpCore.h
        # Per-SDK library search paths so the linker picks the right slice.
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/../../../../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../../../../target/aarch64-apple-ios/release
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../../../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../../../../target/aarch64-apple-ios-sim/release
        # Link order mirrors Chirp:
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_podcast -lnmp_signer_broker -lnmp_core"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  NmpPodcast:
    build:
      targets:
        NmpPodcast: all
