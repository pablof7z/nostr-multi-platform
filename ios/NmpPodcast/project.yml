name: NmpPodcast
options:
  bundleIdPrefix: com.podcast
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
targets:
  NmpPodcast:
    type: application
    platform: iOS
    # T156 Step 1: only the App/Bridge files + the rewired LibraryView
    # group are included in sources. The other 27 view files copied
    # verbatim from /Users/pablofernandez/src/podcast/PodcastApp/Views/
    # remain on disk and will be brought into the build target one group
    # per iteration, behind the corresponding kernel `ViewModule` wrapper.
    # Filed as T-podcast-gap-001 (the verbatim-copy → live target plan).
    sources:
      - path: NmpPodcast/App
      - path: NmpPodcast/Bridge
      - path: NmpPodcast/Features
      - path: NmpPodcast/Resources
    info:
      path: NmpPodcast/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podcast.app
        PRODUCT_NAME: NmpPodcast
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: NmpPodcast/Bridge/NmpCore.h
        # Per-SDK library search paths so the linker picks the right slice.
        # The simulator and device archives live in distinct cargo target dirs
        # (`aarch64-apple-ios-sim` vs `aarch64-apple-ios`); without SDK
        # discrimination the linker grabs the first match and the build fails
        # with an iOS-vs-iOS-simulator mismatch.
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
        # T156 — link order mirrors Chirp:
        # - `nmp_app_podcast` exports per-app FFI (`nmp_app_podcast_*`)
        # - `nmp_signer_broker` registers the bunker:// URI hook (its
        #   static must precede nmp_core so the hook static slot wins
        #   over nmp_core's private copy)
        # - `nmp_core` provides the kernel ABI
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_podcast -lnmp_signer_broker -lnmp_core"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  NmpPodcast:
    build:
      targets:
        NmpPodcast: all
