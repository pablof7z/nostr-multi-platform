name: NmpPulse
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
targets:
  NmpPulse:
    type: application
    platform: iOS
    sources:
      - path: NmpPulse
    info:
      path: NmpPulse/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NmpPulse
        PRODUCT_NAME: NmpPulse
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: NmpPulse/Bridge/NmpCore.h
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
        OTHER_LDFLAGS: "$(inherited) -lnmp_core"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  NmpPulseCapabilityTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NmpPulseTests
    dependencies:
      # Hosted in the NmpPulse app so the test bundle inherits the app's
      # keychain entitlement context — host-less unit-test bundles on the
      # iOS simulator get errSecMissingEntitlement from SecItem*.
      - target: NmpPulse
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NmpPulse.app/NmpPulse"
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NmpPulseCapabilityTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NmpPulse:
    build:
      targets:
        NmpPulse: all
    test:
      targets:
        - NmpPulseCapabilityTests
