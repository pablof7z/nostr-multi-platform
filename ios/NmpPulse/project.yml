name: NmpPulse
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
targets:
  NmpPulse:
    type: application
    platform: iOS
    sources:
      - path: NmpPulse
    info:
      path: NmpPulse/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NmpPulse
        PRODUCT_NAME: NmpPulse
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: NmpPulse/Bridge/NmpCore.h
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
        OTHER_LDFLAGS: "$(inherited) -lnmp_core"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  NmpPulse:
    build:
      targets:
        NmpPulse: all
