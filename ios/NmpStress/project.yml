name: NmpStress
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  NmpStress:
    type: application
    platform: iOS
    sources:
      - path: NmpStress
        excludes:
          - Assets.xcassets
    info:
      path: NmpStress/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NmpStress
        PRODUCT_NAME: NmpStress
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: NmpStress/Bridge/NmpCore.h
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
        OTHER_LDFLAGS: "$(inherited) -lnmp_core"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
  NmpStressUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NmpStressUITests
    dependencies:
      - target: NmpStress
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NmpStressUITests
        TEST_TARGET_NAME: NmpStress
        SWIFT_VERSION: "6.0"

schemes:
  NmpStress:
    build:
      targets:
        NmpStress: all
    test:
      targets:
        - NmpStressUITests
