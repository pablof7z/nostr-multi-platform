name: Chirp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
targets:
  Chirp:
    type: application
    platform: iOS
    sources:
      - path: Chirp
    info:
      path: Chirp/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.Chirp
        PRODUCT_NAME: Chirp
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: Chirp/Bridge/NmpCore.h
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
        # T146 — link `-lnmp_app_chirp` alongside `-lnmp_core`. The per-app
        # crate ships its own static archive because doctrine D0 forbids
        # `nmp-core -> nmp-nip01 / nmp-threading` (the modular timeline
        # composition would close a dep cycle). Listing the chirp lib
        # before nmp_core means the linker resolves its `nmp_app_chirp_*`
        # symbols first; it then pulls in the strong references to the
        # observer slot symbols (`nmp_app_register_event_observer`, etc.)
        # from `libnmp_core.a`.
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_chirp -lnmp_core"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  ChirpTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChirpTests
    dependencies:
      # Host in the Chirp app so the test bundle inherits the app's keychain
      # entitlement context (SecItem* requires it on the iOS simulator).
      - target: Chirp
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Chirp.app/Chirp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ChirpTests
        GENERATE_INFOPLIST_FILE: YES

  ChirpUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChirpUITests
    dependencies:
      - target: Chirp
    settings:
      base:
        TEST_TARGET_NAME: Chirp
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ChirpUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Chirp:
    build:
      targets:
        Chirp: all
    test:
      targets:
        - ChirpTests
        - ChirpUITests
