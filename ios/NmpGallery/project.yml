name: NmpGallery
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
targets:
  NmpGallery:
    type: application
    platform: iOS
    sources:
      - path: NmpGallery
      - path: Resources
        buildPhase: resources
    info:
      path: NmpGallery/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NmpGallery
        PRODUCT_NAME: NmpGallery
        GENERATE_INFOPLIST_FILE: NO
schemes:
  NmpGallery:
    build:
      targets:
        NmpGallery: all
